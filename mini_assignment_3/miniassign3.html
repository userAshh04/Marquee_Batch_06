<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="miniassign3.css">

     
</head>
<body>
    <div class="card">
        <div class="cover">
            <button class="plus-btn">+</button>
        </div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaZnF8ElwCzCgHGTNVnaElToLnw3zE4AgEVQ&s" alt="Profile" class="profile-img">
        <div class="content">
            <h2>Ashutosh Maurya</h2>
            <p class="description">Product Designer who focuses on simplicity & usability.</p>
            <div class="stats">
                <div>
                    <h3>72.9K</h3>
                    <p>Likes</p>
                </div>
                <div>
                    <h3>828</h3>
                    <p>Posts</p>
                </div>
                <div>
                    <h3>342.9K</h3>
                    <p>Views</p>
                </div>
            </div>
            <div class="social-icons">
                <span>
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRe79O-mUpeNRScwqo2U1kERBMUrIMDex76HA&s" alt="instagram">
                </span>
                <span>
                     <img src="https://img.magnific.com/free-vector/twitter-new-2023-x-logo-white-background-vector_1017-45422.jpg?semt=ais_hybrid&w=740&q=80" alt="x">
                </span>
                <span>
                     <img src="https://images.seeklogo.com/logo-png/48/2/threads-logo-png_seeklogo-489791.png" alt="thread">
                </span>
            </div>
        </div>
    </div>
</body>
</html>
